name: Setup persistent workspace
description: Setup Node.js, persistent pnpm binary/cache, and install dependencies

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: '24'
  pnpm-version:
    description: pnpm version to install
    required: false
    default: '10.33.2'
  runner-labels:
    description: JSON array of labels selected for this job's runs-on value
    required: false
    default: '[]'

runs:
  using: composite
  steps:
    - name: Validate persistent runner labels
      shell: bash
      env:
        RUNNER_LABELS_JSON: ${{ inputs.runner-labels }}
      run: |
        set -euo pipefail
        case "$RUNNER_LABELS_JSON" in
          *'"od-persistent-ci"'*) ;;
          *)
            echo "setup-persistent-workspace requires runner-labels containing od-persistent-ci" >&2
            exit 1
            ;;
        esac

    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Setup persistent pnpm
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${OPEN_DESIGN_CI_CACHE:-}" ]; then
          echo "OPEN_DESIGN_CI_CACHE is required for setup-persistent-workspace" >&2
          exit 1
        fi

        store_dir="$OPEN_DESIGN_CI_CACHE/pnpm-store"
        pnpm_root="$OPEN_DESIGN_CI_CACHE/pnpm-bin/${{ inputs.pnpm-version }}"
        pnpm_bin="$pnpm_root/bin/pnpm"
        mkdir -p "$store_dir" "$pnpm_root"
        export NPM_CONFIG_STORE_DIR="$store_dir"
        export npm_config_store_dir="$store_dir"

        {
          echo "NPM_CONFIG_STORE_DIR=$store_dir"
          echo "npm_config_store_dir=$store_dir"
        } >> "$GITHUB_ENV"

        if [ -x "$pnpm_bin" ] && [ "$("$pnpm_bin" --version)" = "${{ inputs.pnpm-version }}" ]; then
          echo "Using cached pnpm ${{ inputs.pnpm-version }} from $pnpm_bin"
        else
          echo "Installing pnpm ${{ inputs.pnpm-version }} into $pnpm_root"
          npm install --global --prefix "$pnpm_root" "pnpm@${{ inputs.pnpm-version }}"
        fi

        echo "$pnpm_root/bin" >> "$GITHUB_PATH"
        "$pnpm_bin" --version
        "$pnpm_bin" store path --silent

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
