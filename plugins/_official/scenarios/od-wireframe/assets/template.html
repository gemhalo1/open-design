<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wireframe</title>
  <style>
    :root { color-scheme: light; --ink:#1f2937; --muted:#6b7280; --line:#cbd5e1; --panel:#ffffff; --soft:#f1f5f9; --accent:#2563eb; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: #f8fafc; }
    main { max-width: 1180px; margin: 0 auto; padding: 40px 28px; }
    .wire-title { margin: 0 0 20px; font-size: 28px; letter-spacing: 0; }
    .screen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    .screen { min-height: 360px; padding: 18px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); box-shadow: 0 8px 24px rgba(15, 23, 42, .06); }
    .screen h2 { margin: 0 0 12px; font-size: 16px; }
    .annotation { display: inline-flex; gap: 6px; margin-bottom: 16px; color: var(--muted); font-size: 12px; }
    .block { border: 1px dashed var(--line); border-radius: 6px; background: var(--soft); min-height: 44px; margin: 10px 0; }
    .block.hero { min-height: 86px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cta { width: 44%; min-height: 36px; border: 2px solid var(--accent); border-radius: 6px; background: #fff; }
  </style>
</head>
<body>
  <main>
    <h1 class="wire-title">Wireframe flow</h1>
    <section class="screen-grid">
      <article class="screen">
        <h2>01 Entry</h2>
        <p class="annotation">Purpose: frame the user intent</p>
        <div class="block hero"></div>
        <div class="block"></div>
        <div class="cta"></div>
      </article>
      <article class="screen">
        <h2>02 Core task</h2>
        <p class="annotation">Purpose: complete the main action</p>
        <div class="row"><div class="block hero"></div><div class="block hero"></div></div>
        <div class="block"></div>
        <div class="cta"></div>
      </article>
    </section>
  </main>
</body>
</html>
