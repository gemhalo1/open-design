<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Social Card</title>
  <style>
    :root { --ink:#111; --muted:#737373; --paper:#fff; --line:#e5e5e5; --accent:#1d9bf0; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: var(--ink); }
    .frame-board { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .social-frame { width: 960px; aspect-ratio: 16 / 9; padding: 56px; border: 1px solid var(--line); border-radius: 0; background: var(--paper); box-shadow: 0 20px 60px rgba(0,0,0,.08); }
    .kicker { color: var(--accent); font-size: 18px; font-weight: 800; letter-spacing: .02em; text-transform: uppercase; }
    h1 { max-width: 760px; margin: 36px 0 0; font-size: 82px; line-height: .92; letter-spacing: 0; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 52px; color: var(--muted); font-size: 20px; }
    .rule { width: 120px; height: 6px; background: var(--accent); }
  </style>
</head>
<body>
  <main class="frame-board">
    <!-- Export: 1920x1080 Twitter/X frame -->
    <article class="social-frame">
      <div class="kicker">Platform / topic</div>
      <h1>One sharp social statement.</h1>
      <div class="meta"><span>@brand</span><span class="rule"></span></div>
    </article>
  </main>
</body>
</html>
