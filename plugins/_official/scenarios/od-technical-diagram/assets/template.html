<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Technical Diagram</title>
  <style>
    :root { --ink:#172033; --muted:#667085; --line:#98a2b3; --panel:#fff; --soft:#f2f4f7; --accent:#2563eb; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: var(--ink); }
    .board { width: min(1120px, calc(100vw - 48px)); padding: 28px; border: 1px solid #d0d5dd; border-radius: 10px; background: var(--panel); box-shadow: 0 20px 60px rgba(15,23,42,.08); }
    h1 { margin: 0 0 18px; font-size: 26px; letter-spacing: 0; }
    svg { width: 100%; height: auto; display: block; }
    .node { fill: var(--panel); stroke: var(--line); stroke-width: 2; }
    .node.accent { stroke: var(--accent); fill: #eff6ff; }
    .edge { fill: none; stroke: var(--line); stroke-width: 2; marker-end: url(#arrow); }
    text { fill: var(--ink); font-family: Inter, ui-sans-serif, system-ui; font-size: 15px; font-weight: 650; }
    .label { fill: var(--muted); font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
  <main class="board">
    <h1>System diagram</h1>
    <svg viewBox="0 0 980 460" role="img" aria-label="Technical diagram">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
          <path d="M0,0 L10,4 L0,8 Z" fill="#98a2b3"></path>
        </marker>
      </defs>
      <rect class="node accent" x="60" y="170" width="180" height="80" rx="16"></rect>
      <text x="150" y="215" text-anchor="middle">Client</text>
      <rect class="node" x="390" y="80" width="200" height="80" rx="16"></rect>
      <text x="490" y="125" text-anchor="middle">Application</text>
      <rect class="node" x="390" y="270" width="200" height="80" rx="16"></rect>
      <text x="490" y="315" text-anchor="middle">Worker</text>
      <rect class="node" x="740" y="170" width="180" height="80" rx="16"></rect>
      <text x="830" y="215" text-anchor="middle">Storage</text>
      <path class="edge" d="M240 210 C300 210 315 120 390 120"></path>
      <text class="label" x="300" y="142">request</text>
      <path class="edge" d="M590 120 C670 120 670 210 740 210"></path>
      <text class="label" x="648" y="142">read/write</text>
      <path class="edge" d="M590 310 C670 310 670 225 740 225"></path>
      <text class="label" x="642" y="292">async job</text>
    </svg>
  </main>
</body>
</html>
