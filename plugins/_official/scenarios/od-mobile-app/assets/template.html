<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile App Prototype</title>
  <style>
    :root { --ink:#101828; --muted:#667085; --line:#d0d5dd; --panel:#ffffff; --soft:#f2f4f7; --accent:#155eef; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: #eef2f6; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .phone-row { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .phone { width: 360px; height: 760px; overflow: hidden; border: 10px solid #111827; border-radius: 42px; background: var(--panel); box-shadow: 0 24px 70px rgba(15, 23, 42, .24); }
    .status { height: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 12px; font-weight: 700; }
    .app { height: calc(100% - 34px); display: flex; flex-direction: column; }
    header { padding: 18px 22px 12px; }
    header h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .content { flex: 1; padding: 0 18px 18px; overflow: hidden; }
    .card { margin: 12px 0; padding: 16px; border: 1px solid var(--line); border-radius: 18px; background: var(--panel); box-shadow: 0 4px 16px rgba(15, 23, 42, .06); }
    .pill { display: inline-flex; height: 32px; align-items: center; padding: 0 12px; border-radius: 999px; background: var(--soft); color: var(--muted); font-size: 13px; }
    .cta { height: 48px; display: grid; place-items: center; margin-top: 14px; border-radius: 16px; background: var(--accent); color: white; font-weight: 750; }
    nav { height: 70px; display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--line); color: var(--muted); font-size: 11px; }
    nav span { display: grid; place-items: center; }
  </style>
</head>
<body>
  <main>
    <section class="phone-row">
      <article class="phone">
        <div class="status"><span>9:41</span><span>5G 100%</span></div>
        <div class="app">
          <header><h1>App flow</h1></header>
          <div class="content">
            <span class="pill">Today</span>
            <div class="card">Primary mobile task</div>
            <div class="card">Supporting information</div>
            <div class="cta">Continue</div>
          </div>
          <nav><span>Home</span><span>Search</span><span>Inbox</span><span>Me</span></nav>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
